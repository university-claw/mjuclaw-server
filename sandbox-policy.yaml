version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  - /sandbox/.openclaw
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
  - /sandbox/.openclaw-data
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude_code
    endpoints:
    - host: api.anthropic.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: '*'
          path: /**
    - host: statsig.anthropic.com
      port: 443
      rules:
      - allow:
          method: '*'
          path: /**
    - host: sentry.io
      port: 443
      rules:
      - allow:
          method: '*'
          path: /**
    binaries:
    - path: /usr/local/bin/claude
  clawhub:
    name: clawhub
    endpoints:
    - host: clawhub.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
  discord:
    name: discord
    endpoints:
    - host: discord.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    - host: gateway.discord.gg
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    - host: cdn.discordapp.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/node
  github:
    name: github
    endpoints:
    - host: github.com
      port: 443
      access: full
    - host: api.github.com
      port: 443
      access: full
    binaries:
    - path: /usr/bin/gh
    - path: /usr/bin/git
  npm_registry:
    name: npm_registry
    endpoints:
    - host: registry.npmjs.org
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/npm
  npm_yarn:
    name: npm_yarn
    endpoints:
    - host: registry.npmjs.org
      port: 443
      access: full
    - host: registry.yarnpkg.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/npm*
    - path: /usr/local/bin/npx*
    - path: /usr/local/bin/node*
    - path: /usr/local/bin/yarn*
    - path: /usr/bin/npm*
    - path: /usr/bin/node*
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: '*'
          path: /**
    - host: inference-api.nvidia.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: '*'
          path: /**
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/openclaw
  openclaw_api:
    name: openclaw_api
    endpoints:
    - host: openclaw.ai
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
  openclaw_docs:
    name: openclaw_docs
    endpoints:
    - host: docs.openclaw.ai
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
  pypi:
    name: pypi
    endpoints:
    - host: pypi.org
      port: 443
      access: full
    - host: files.pythonhosted.org
      port: 443
      access: full
    binaries:
    - path: /usr/bin/python3*
    - path: /usr/bin/pip*
    - path: /usr/local/bin/python3*
    - path: /usr/local/bin/pip*
    - path: /sandbox/.venv/bin/python*
    - path: /sandbox/.venv/bin/pip*
    - path: /sandbox/.uv/python/**/python*
    - path: /sandbox/.local/bin/pip*
  telegram:
    name: telegram
    endpoints:
    - host: api.telegram.org
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /bot*/**
      - allow:
          method: POST
          path: /bot*/**
    binaries:
    - path: /usr/local/bin/node
  # ── Google AI Studio (gemma-4-26b-a4b-it) ────────────────────────
  google_ai:
    name: google_ai
    endpoints:
    - host: generativelanguage.googleapis.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/local/bin/node*
